<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detector de Fake News</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>📰 Detector de Fake News</h1>

        <p>
            Digite uma notícia abaixo e descubra a probabilidade dela ser falsa.
        </p>

        <textarea
            id="news"
            placeholder="Cole aqui a notícia..."
        ></textarea>

        <button onclick="analyzeNews()">
            Analisar Notícia
        </button>

        <div id="result"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
